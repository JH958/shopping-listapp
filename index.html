<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #f0f4f8;
      animation: fadeIn 0.2s ease;
    }

    li:last-child {
      border-bottom: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #667eea;
      flex-shrink: 0;
    }

    /* 접근성: label을 item-text처럼 표시 */
    li label {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      cursor: pointer;
      transition: color 0.2s;
    }

    li.checked label {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: none;
      border: 2px solid #fed7d7;
      border-radius: 10px;
      color: #e53e3e;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .clear-btn:hover {
      background: #fff5f5;
    }

    .storage-error {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: 8px;
      color: #c53030;
      font-size: 0.85rem;
      padding: 8px 12px;
      margin-bottom: 16px;
      display: none;
    }

    .loading {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="storage-error" id="storageError">
      저장소를 사용할 수 없습니다. 데이터가 저장되지 않을 수 있습니다.
    </div>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button id="addBtn">추가</button>
    </div>

    <div class="stats" id="stats"></div>

    <ul id="list"></ul>

    <div class="loading" id="loading">데이터를 불러오는 중...</div>
    <div class="empty" id="empty" style="display:none">아직 아이템이 없습니다.</div>

    <button class="clear-btn" id="clearBtn" style="display:none">
      완료된 항목 삭제
    </button>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    // ── Supabase 초기화 ───────────────────────────────────────────────
    const SUPABASE_URL = 'https://fbserhyxhcrbanaxllvv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZic2VyaHl4aGNyYmFuYXhsbHZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTMxNzYsImV4cCI6MjA4OTEyOTE3Nn0.0QY_pcrqXdqmdZxJa3W2we9Mna2E-HY9nT-qHdO8iZA';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];

    // ── 오류 표시 ─────────────────────────────────────────────────────
    function showError(msg) {
      const el = document.getElementById('storageError');
      el.textContent = msg;
      el.style.display = 'block';
    }

    // ── DOM 렌더링 ────────────────────────────────────────────────────
    function render() {
      const list     = document.getElementById('list');
      const empty    = document.getElementById('empty');
      const loading  = document.getElementById('loading');
      const stats    = document.getElementById('stats');
      const clearBtn = document.getElementById('clearBtn');

      loading.style.display = 'none';
      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        stats.textContent   = '';
        clearBtn.style.display = 'none';
        return;
      }

      empty.style.display = 'none';

      const done = items.filter(i => i.checked).length;
      stats.textContent      = `${done} / ${items.length} 완료`;
      clearBtn.style.display = done > 0 ? 'block' : 'none';

      items.forEach(item => {
        const li      = document.createElement('li');
        const checkId = `item-${item.id}`;

        if (item.checked) li.classList.add('checked');

        const checkbox = document.createElement('input');
        checkbox.type    = 'checkbox';
        checkbox.id      = checkId;
        checkbox.checked = item.checked;
        checkbox.addEventListener('change', () => toggle(item.id, !item.checked));

        const label = document.createElement('label');
        label.htmlFor     = checkId;
        label.textContent = item.text;

        const delBtn = document.createElement('button');
        delBtn.className   = 'delete-btn';
        delBtn.title       = '삭제';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', () => deleteItem(item.id));

        li.append(checkbox, label, delBtn);
        list.appendChild(li);
      });
    }

    // ── Supabase CRUD ─────────────────────────────────────────────────
    async function loadItems() {
      const { data, error } = await supabase
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) { showError('데이터 로드 실패: ' + error.message); return; }
      items = data;
      render();
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const text  = input.value.trim();
      if (!text) return;

      const { data, error } = await supabase
        .from('shopping_items')
        .insert({ text, checked: false })
        .select()
        .single();

      if (error) { showError('추가 실패: ' + error.message); return; }
      items.unshift(data);
      render();
      input.value = '';
      input.focus();
    }

    async function toggle(id, newChecked) {
      const { error } = await supabase
        .from('shopping_items')
        .update({ checked: newChecked })
        .eq('id', id);

      if (error) { showError('업데이트 실패: ' + error.message); return; }
      const item = items.find(i => i.id === id);
      if (item) item.checked = newChecked;
      render();
    }

    async function deleteItem(id) {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) { showError('삭제 실패: ' + error.message); return; }
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      if (checkedIds.length === 0) return;

      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .in('id', checkedIds);

      if (error) { showError('삭제 실패: ' + error.message); return; }
      items = items.filter(i => !i.checked);
      render();
    }

    // ── 이벤트 바인딩 ─────────────────────────────────────────────────
    document.getElementById('addBtn').addEventListener('click', addItem);
    document.getElementById('clearBtn').addEventListener('click', clearChecked);
    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
